name: Design system quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  design-system:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Check architecture boundaries
        run: npm run architecture:check
      - name: Build production site
        run: npm run build
      - name: Build Storybook documentation
        run: npm run build-storybook
